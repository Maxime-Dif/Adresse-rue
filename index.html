<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analyse de rues</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:transparent;--surface:#fffcf7;--ink:#1a1208;--ink2:#6b5e45;
  --accent:#f07020;--border:#e0d5c0;--radius:16px;
}
html,body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--ink);}
body{display:flex;align-items:flex-start;justify-content:center;padding:40px 16px 80px;}
.card{width:100%;max-width:560px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px 24px 28px;box-shadow:0 2px 20px rgba(30,18,0,.07);}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.headline{font-family:'DM Serif Display',serif;font-size:26px;line-height:1.15;margin-bottom:4px;}
.sub{font-size:13px;color:var(--ink2);margin-bottom:24px;line-height:1.5;}
.input-wrap{position:relative;}
.field{width:100%;font-family:'DM Sans',sans-serif;font-size:15px;padding:13px 40px 13px 16px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;outline:none;color:var(--ink);transition:border-color .15s;}
.field:focus{border-color:var(--accent);}
.field::placeholder{color:#b5a98a;}
.clear-btn{all:unset;position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--ink2);font-size:20px;line-height:1;opacity:0;transition:opacity .15s;padding:4px;}
.clear-btn.visible{opacity:.5;}
.clear-btn:hover{opacity:1;}
.status{font-size:13px;color:var(--ink2);min-height:22px;margin:10px 0 0;display:flex;align-items:center;gap:7px;}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;display:none;}
.spinner.on{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
.list{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.sug{all:unset;cursor:pointer;display:block;padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);background:#fff;transition:background .12s,border-color .12s,transform .1s;}
.sug:hover{background:var(--bg);border-color:#c8b99a;transform:translateX(3px);}
.sug-label{font-size:14px;font-weight:500;line-height:1.3;}
.sug-sub{font-size:12px;color:var(--ink2);margin-top:2px;}
.result{margin-top:20px;border-radius:var(--radius);border:1.5px solid var(--accent);background:#fff9f5;padding:22px;display:none;animation:fadeIn .2s ease;}
.result.show{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.result-rue{font-family:'DM Serif Display',serif;font-size:17px;line-height:1.25;margin-bottom:18px;}
.count-row{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
.count-num{font-family:'DM Serif Display',serif;font-size:56px;color:var(--accent);line-height:1;}
.count-label{font-size:14px;color:var(--ink2);line-height:1.4;}
.verdict{margin-top:14px;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;}
.verdict.go{background:#e8f5ea;color:#1e5c28;}
.verdict.maybe{background:#fdf7ec;color:#7a5810;}
.verdict.nogo{background:#fdf0ec;color:#7a2a10;}
.bati{margin-top:10px;border-radius:10px;padding:11px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;}
.bati.pavillon{background:#e8f0fd;color:#1a3c7a;}
.bati.collectif{background:#f3e8fd;color:#5a1a7a;}
.bati.mixte{background:#fdf7ec;color:#7a5810;}
.note{font-size:11px;color:#b5a98a;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);line-height:1.6;}
footer{font-size:11px;color:#b5a98a;text-align:center;margin-top:20px;line-height:1.6;}
.card-header{position:relative;}
.logo{position:absolute;top:0;right:0;width:44px;height:44px;border-radius:10px;object-fit:cover;}
</style>
</head>

  <div class="input-wrap">
    <input id="q" class="field" type="text" placeholder="Ex : rue de la Paix, Paris…" autocomplete="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn">×</button>
  </div>

  <div class="status" id="status">
    <div class="spinner" id="spinner"></div>

  </div>

  <div class="result" id="result">
    <div class="result-rue" id="resRue"></div>
    <div class="count-row">
      <div class="count-num" id="resNum">—</div>
      <div class="count-label">adresse(s)<br>répertoriée(s)</div>
    </div>

      <span id="verdictIcon"></span>
      <span id="verdictText"></span>
    </div>
    <div class="bati" id="bati" style="display:none">
      <span id="batiIcon"></span>
      <span id="batiText"></span>

<script>
(() => {
  const qEl       = document.getElementById('q');
  const listEl    = document.getElementById('list');
  const spinner   = document.getElementById('spinner');
  const statusTxt = document.getElementById('statusText');
  const clearBtn  = document.getElementById('clearBtn');
  const resultEl  = document.getElementById('result');
  const resRue    = document.getElementById('resRue');
  const resNum    = document.getElementById('resNum');
  const verdict   = document.getElementById('verdict');
  const verdictIcon = document.getElementById('verdictIcon');
  const verdictTxt  = document.getElementById('verdictText');
  const batiEl      = document.getElementById('bati');
  const batiIcon    = document.getElementById('batiIcon');
  const batiTxt     = document.getElementById('batiText');
  let timer = null;

  function setStatus(txt, loading=false){
    statusTxt.textContent = txt;
    spinner.classList.toggle('on', loading);
  }
  function hideResult(){ resultEl.classList.remove('show'); }

  function showResult(label, count, citycode, city, postcode){
    resRue.textContent = label;
    resNum.textContent = count;

    if(count === 0){
      verdict.className = 'verdict nogo';
      verdictIcon.textContent = '⚠️';
      verdictTxt.textContent = 'Aucune adresse trouvée — rue peut-être absente de la BAN.';
    } else {
      verdict.className = 'verdict maybe';
      verdictIcon.textContent = '⏳';
      verdictTxt.textContent = 'Analyse du type de bâti en cours…';
    }

    resultEl.classList.add('show');
  }

  // Lecture CSV unique : compte les adresses ET récupère leurs coordonnées
  async function getStreetData(p){
    const csvUrl = "https://plateforme.adresse.data.gouv.fr/ban/communes/"
      + p.citycode + "/download/csv-legacy/adresses";
    const r = await fetch(csvUrl);
    if(!r.ok) throw new Error("CSV commune HTTP " + r.status);

    const reader  = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "", headers = null;
    let idxFantoir=-1, idxLon=-1, idxLat=-1;
    let count = 0, coords = [];

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, {stream:true});
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for(const line of lines){
        if(!line.trim()) continue;
        const cols = line.split(";");
        if(!headers){
          headers = cols.map(h=>h.trim());
          idxFantoir = headers.indexOf("id_fantoir");
          idxLon     = headers.indexOf("lon");
          idxLat     = headers.indexOf("lat");
          if(idxFantoir === -1) throw new Error("Colonne id_fantoir introuvable");
          continue;
        }
        if(cols[idxFantoir] === p.id){
          count++;
          const clon = parseFloat(cols[idxLon]);
          const clat = parseFloat(cols[idxLat]);
          if(!isNaN(clon) && !isNaN(clat)) coords.push([clon, clat]);
        }
      }
    }
    if(buffer.trim()){
      const cols = buffer.split(";");
      if(headers && cols[idxFantoir] === p.id) count++;
    }
    return {count, coords};
  }

  // Détection bâti via WFS IGN à partir des coordonnées des adresses
  async function detectBati(coords, fallbackLon, fallbackLat){
    if(coords.length === 0){
      if(!fallbackLon || !fallbackLat) return;
      coords = [[fallbackLon, fallbackLat]];
    }
    const lons = coords.map(c=>c[0]), lats = coords.map(c=>c[1]);
    const m = 0.0005;
    const bbox = (Math.min(...lons)-m)+","+(Math.min(...lats)-m)+","+(Math.max(...lons)+m)+","+(Math.max(...lats)+m);

    const wfsUrl = "https://data.geopf.fr/wfs/ows?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature"
      + "&TYPENAMES=BDTOPO_V3:batiment&BBOX=" + bbox + ",EPSG:4326"
      + "&outputFormat=application/json&count=500";

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    let r;
    try {
      r = await fetch(wfsUrl, {signal: controller.signal});
      clearTimeout(timeout);
    } catch(e) {
      clearTimeout(timeout);
      // IGN ne répond pas — verdict impossible
      verdict.className = 'verdict maybe';
      verdictIcon.textContent = '🤔';
      verdictTxt.textContent = 'Analyse du bâti indisponible sur cette rue.';
      return;
    }
    if(!r.ok) return;
    const j = await r.json();
    const feats = j.features || [];

    function dist(lon1,lat1,lon2,lat2){
      const dx=(lon2-lon1)*111320*Math.cos(lat1*Math.PI/180);
      const dy=(lat2-lat1)*111320;
      return Math.sqrt(dx*dx+dy*dy);
    }

    function dist(lon1,lat1,lon2,lat2){
      const dx=(lon2-lon1)*111320*Math.cos(lat1*Math.PI/180);
      const dy=(lat2-lat1)*111320;
      return Math.sqrt(dx*dx+dy*dy);
    }

    const proches = feats.filter(bat => {
      const ring = bat.geometry?.coordinates?.[0]?.[0];
      if(!ring) return true;
      const blon = Array.isArray(ring[0]) ? ring[0][0] : ring[0];
      const blat = Array.isArray(ring[0]) ? ring[0][1] : ring[1];
      return coords.some(c => dist(c[0],c[1],blon,blat) < 60);
    });

    if(proches.length === 0){
      batiEl.style.display="none";
      verdict.className = 'verdict maybe';
      verdictIcon.textContent = '🤔';
      verdictTxt.textContent = "Impossible d'analyser le bâti sur cette rue.";
      return;
    }

    let individuel = 0, collectif = 0, entreprise = 0;
    proches.forEach(bat => {
      const u = (bat.properties?.usage_1||"").toLowerCase();
      const logements = bat.properties?.nombre_de_logements;
      if(u.includes("résidentiel")){
        if((logements||1) <= 1) individuel++;
        else collectif++;
      } else if(u.includes("commercial") || u.includes("industriel")){
        entreprise++;
      }
    });

    const total  = individuel + collectif + entreprise;
    if(total === 0){
      batiEl.style.display="none";
      verdict.className = 'verdict maybe';
      verdictIcon.textContent = '🤔';
      verdictTxt.textContent = "Impossible d'analyser le bâti sur cette rue.";
      return;
    }
    const pIndiv = Math.round(individuel/total*100);
    const pColl  = Math.round(collectif/total*100);
    const pEntr  = Math.round(entreprise/total*100);

    // Verdict basé sur % maisons individuelles
    verdict.className = 'verdict';
    if(pIndiv < 50){
      verdict.classList.add('nogo');
      verdictIcon.textContent = '🚫';
      verdictTxt.textContent = 'Rue peu adaptée — seulement ' + pIndiv + '% de maisons individuelles.';
    } else if(pIndiv < 75){
      verdict.classList.add('maybe');
      verdictIcon.textContent = '👍';
      verdictTxt.textContent = 'Rue optimale — ' + pIndiv + '% de maisons individuelles.';
    } else {
      verdict.classList.add('go');
      verdictIcon.textContent = '🏆';
      verdictTxt.textContent = 'Rue parfaite — ' + pIndiv + '% de maisons individuelles !';
    }

    batiEl.style.display = "block";
    batiEl.className = "bati";
    if(pIndiv >= 70) batiEl.classList.add("pavillon");
    else if(pColl >= 50) batiEl.classList.add("collectif");
    else batiEl.classList.add("mixte");

    batiIcon.textContent = "";
    batiTxt.innerHTML = `<div style="font-size:15px;font-weight:700;margin-bottom:5px;">🏠 ${pIndiv}% maisons individuelles</div><div style="font-size:12px;opacity:.8;">🏢 ${pColl}% collectif · 🏭 ${pEntr}% entreprise</div>`;
  }

  function formatLabel(p){
    const name = (p.name || "").trim();
    const pc   = p.postcode || "";
    const city = p.city || "";
    if(name && pc && city) return `${name}, ${pc} ${city}`;
    return (p.label || "").trim();
  }

  function render(features){
    listEl.innerHTML = "";
    features.forEach(f => {
      const p = f.properties || {};
      const label = formatLabel(p);
      if(!label) return;
      const btn = document.createElement("button");
      btn.className = "sug";
      btn.innerHTML = `
        <div class="sug-label">${label}</div>
        ${p.context ? `<div class="sug-sub">${p.context}</div>` : ""}
      `;
      btn.onclick = async () => {
        listEl.innerHTML = "";
        hideResult();
        batiEl.style.display = "none";
        qEl.value = label;
        clearBtn.classList.add('visible');
        setStatus("Chargement des données…", true);
        try {
          const lon = f.geometry?.coordinates?.[0];
          const lat = f.geometry?.coordinates?.[1];
          // 1) CSV d'abord pour avoir count + coords
          const {count, coords} = await getStreetData(p);
          // 2) Affiche le résultat avec verdict ⏳
          setStatus("");
          showResult(label, count, p.citycode, p.city, p.postcode);
          // 3) WFS met à jour le verdict une fois terminé
          await detectBati(coords, lon, lat).catch(()=>{
            verdict.className = 'verdict maybe';
            verdictIcon.textContent = '🤔';
            verdictTxt.textContent = "Impossible d'analyser le bâti — données IGN indisponibles.";
          });
        } catch(e){
          setStatus("Erreur : " + e.message);
        }
      };
      listEl.appendChild(btn);
    });
  }

  qEl.addEventListener("input", () => {
    const v = qEl.value.trim();
    clearBtn.classList.toggle('visible', v.length > 0);
    listEl.innerHTML = "";
    hideResult();
    setStatus("");
    if(v.length < 3) return;
    clearTimeout(timer);
    timer = setTimeout(async () => {
      try {
        setStatus("Recherche…", true);
        const r = await fetch("https://api-adresse.data.gouv.fr/search/?q="
          + encodeURIComponent(v) + "&type=street&limit=8&autocomplete=1");
        const j = await r.json();
        const feats = j.features || [];
        if(!feats.length){ setStatus("Aucune rue trouvée."); return; }
        setStatus("Sélectionnez une rue.");
        spinner.classList.remove('on');
        render(feats);
      } catch(e){
        setStatus("Erreur : " + e.message);
      }
    }, 220);
  });

  clearBtn.onclick = () => {
    qEl.value = "";
    clearBtn.classList.remove('visible');
    listEl.innerHTML = "";
    hideResult();
    setStatus("");
    qEl.focus();
  };
})();
</script>
</body>
</html>
